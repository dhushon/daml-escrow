name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - feat/phase3-oracle-integration

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run unit tests
        run: go test -v ./...

  daml-tests:
    name: DAML Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install DAML SDK and DPM
        run: |
          # Install Daml SDK
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "/home/runner/.daml/bin" >> $GITHUB_PATH
          
          # Install DPM (Digital Asset Package Manager)
          curl -L https://dpm.daml.com/install.sh | sh
          echo "/home/runner/.dpm/bin" >> $GITHUB_PATH

      - name: Build and Test with DPM
        run: |
          # Ensure paths are loaded in the current shell too for this step
          export PATH="/home/runner/.daml/bin:/home/runner/.dpm/bin:$PATH"
          cd contracts
          dpm build --all
          cd stablecoin-escrow-tests
          dpm test
