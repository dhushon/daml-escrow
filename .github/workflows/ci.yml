name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run unit tests
        run: go test -v ./...

  daml-tests:
    name: DAML Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install DAML SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 2.2.0
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Run DAML tests
        run: |
          cd contracts
          daml test
