name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - feat/phase3-oracle-integration
      - feat/bitgo-stablecoin-integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: ./...

  unit-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run unit tests
        run: go test -v ./...

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout cx-commons
        uses: actions/checkout@v5
        with:
          repository: vdatacloud/cx-commons
          path: temp-cx-commons

      - name: Move cx-commons to sibling position
        run: mv temp-cx-commons ../cx-commons

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build cx-commons
        run: |
          cd ../cx-commons
          npm install
          npm run build

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Verify build
        run: cd frontend && npm run build

      - name: Run unit tests
        run: cd frontend && npm run test

  daml-tests:
    name: DAML Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install and Run DPM
        run: |
          curl -L https://get.digitalasset.com/install/install.sh | sh
          export PATH="/home/runner/.dpm/bin:$PATH"
          
          if ! command -v dpm &> /dev/null; then
            echo "dpm installation failed or not in PATH"
            exit 1
          fi
          
          # Install the specific SDK version required by our daml.yaml configurations
          dpm install 3.4.11
          
          cd contracts
          dpm build --all
          cd stablecoin-escrow-tests
          dpm test


