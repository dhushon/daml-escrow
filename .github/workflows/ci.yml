name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - feat/phase3-oracle-integration
      - feat/bitgo-stablecoin-integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: ./...

  unit-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run unit tests
        run: go test -v ./...

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Verify build
        run: cd frontend && npm run build

      - name: Run unit tests
        run: cd frontend && npm run test

  daml-tests:
    name: DAML Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install and Run DPM
        run: |
          curl -L https://get.digitalasset.com/install/install.sh | sh
          export PATH="/home/runner/.dpm/bin:$PATH"
          
          if ! command -v dpm &> /dev/null; then
            echo "dpm installation failed or not in PATH"
            exit 1
          fi
          
          # Install the specific SDK version required by our daml.yaml configurations
          dpm install 3.4.11
          
          cd contracts
          dpm build --all
          cd stablecoin-escrow-tests
          dpm test

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install DPM
        run: |
          curl -L https://get.digitalasset.com/install/install.sh | sh
          echo "/home/runner/.dpm/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.dpm/bin:$PATH"
          dpm install 3.4.11
          cd contracts
          dpm build --all

      - name: Build ledger-sync utility
        run: |
          mkdir -p bin
          go build -o bin/ledger-sync ./cmd/ledger-sync/main.go

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install
          npx playwright install chromium --with-deps

      - name: Start services and run tests
        run: |
          export PATH="/home/runner/.dpm/bin:$PATH"
          make standalone-up
          
          # Wait for Go API backend and Astro dev server to start
          npx wait-on -t 120000 http-get://localhost:8081/api/v1/health http-get://localhost:4321/login
          
          cd frontend
          npx playwright test
        env:
          CI: true

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== Standalone API Log ==="
          cat log/standalone-api.log || true
          echo "=== Standalone Frontend Log ==="
          cat log/standalone-frontend.log || true

      - name: Clean up stack
        if: always()
        run: |
          make standalone-down
