name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - feat/phase3-oracle-integration

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run unit tests
        run: go test -v ./...

  daml-tests:
    name: DAML Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install and Run DPM
        run: |
          # 1. Install Daml SDK
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          export PATH="/home/runner/.daml/bin:$PATH"
          
          # 2. Install DPM
          curl -L https://dpm.daml.com/install.sh | sh
          export PATH="/home/runner/.dpm/bin:$PATH"
          
          # 3. Verify installation
          if ! command -v dpm &> /dev/null; then
            echo "dpm not found in PATH, searching..."
            find /home/runner -name dpm -type f
            exit 1
          fi
          
          # 4. Build and Test
          cd contracts
          dpm build --all
          cd stablecoin-escrow-tests
          dpm test
