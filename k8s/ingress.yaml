apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: escrow-ingress
  namespace: bank
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - http:
      paths:
      - path: /bank/(.*)
        pathType: Prefix
        backend:
          service:
            name: bank-api
            port:
              number: 80
      - path: /buyer/(.*)
        pathType: Prefix
        backend:
          service:
            name: buyer-api-cross # Linked via ExternalName
            port:
              number: 80
      - path: /seller/(.*)
        pathType: Prefix
        backend:
          service:
            name: seller-api-cross # Linked via ExternalName
            port:
              number: 80
---
# Cross-Namespace Links (ExternalName)
apiVersion: v1
kind: Service
metadata:
  name: buyer-api-cross
  namespace: bank
spec:
  type: ExternalName
  externalName: buyer-api.buyer.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: seller-api-cross
  namespace: bank
spec:
  type: ExternalName
  externalName: seller-api.seller.svc.cluster.local
