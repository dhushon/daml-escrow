apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: escrow-ingress
  namespace: bank
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
    # High-Assurance Identity
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.global-static-ip-name: "escrow-gateway-ip-dev"
    # mTLS (Internal Proxy Auth)
    nginx.ingress.kubernetes.io/proxy-ssl-secret: "bank/bank-api-mtls-secret"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    # High-Assurance TLS 1.3 Enforcement
    nginx.ingress.kubernetes.io/proxy-ssl-protocols: "TLSv1.3"
spec:
  tls:
  - hosts:
    - api.vdatacloudai.com
    secretName: escrow-gateway-tls-secret
  rules:
  - host: api.vdatacloudai.com
    http:
      paths:
      - path: /bank/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: bank-api
            port:
              number: 443
      - path: /depositor/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: depositor-api-cross
            port:
              number: 443
      - path: /beneficiary/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: beneficiary-api-cross
            port:
              number: 443
---
# Cross-Namespace Services for Ingress (Sovereign Routing)
apiVersion: v1
kind: Service
metadata:
  name: depositor-api-cross
  namespace: bank
spec:
  type: ExternalName
  externalName: depositor-api.depositor.svc.cluster.local
  ports:
  - port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: beneficiary-api-cross
  namespace: bank
spec:
  type: ExternalName
  externalName: beneficiary-api.beneficiary.svc.cluster.local
  ports:
  - port: 443
