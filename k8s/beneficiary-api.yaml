apiVersion: apps/v1
kind: Deployment
metadata:
  name: beneficiary-api
  namespace: beneficiary
  labels:
    app: beneficiary-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beneficiary-api
  template:
    metadata:
      labels:
        app: beneficiary-api
    spec:
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/vdcai-daml/escrow-platform-dev/escrow-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: LEDGER_HOST
          value: "beneficiary-ledger.beneficiary.svc.cluster.local"
        - name: LEDGER_NODES_BENEFICIARY_HOST
          value: "beneficiary-ledger.beneficiary.svc.cluster.local"
        - name: LEDGER_PORT
          value: "7575"
        - name: PARTICIPANT_ID
          value: "beneficiary"
        - name: GCP_PROJECT_ID
          value: "vdcai-daml"
        - name: ENVIRONMENT
          value: "dev"
        - name: USER_CONFIG_DSN
          value: "postgres://escrow:escrow@escrow-postgres-dist.default.svc.cluster.local:5432/user_config?sslmode=disable"
        command: ["/app/escrow-api"]
        args: ["serve", "--tls-cert=/etc/escrow/certs/tls.crt", "--tls-key=/etc/escrow/certs/tls.key", "--tls-ca=/etc/escrow/certs/ca.crt"]
        volumeMounts:
        - name: certs
          mountPath: /etc/escrow/certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: beneficiary-api-mtls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: beneficiary-api
  namespace: beneficiary
spec:
  ports:
  - port: 443
    targetPort: 8080
    name: https
  selector:
    app: beneficiary-api
  type: ClusterIP
