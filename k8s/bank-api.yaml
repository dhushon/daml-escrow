apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-api
  namespace: bank
  labels:
    app: bank-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-api
  template:
    metadata:
      labels:
        app: bank-api
    spec:
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/vdcai-daml/escrow-platform-dev/escrow-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: LEDGER_HOST
          value: "bank-ledger.bank.svc.cluster.local"
        - name: LEDGER_PORT
          value: "7575"
        - name: PARTICIPANT_ID
          value: "bank"
        - name: GCP_PROJECT_ID
          value: "vdcai-daml"
        - name: ENVIRONMENT
          value: "dev"
        # Secret Manager will authoritatively vend OKTA_CLIENT_SECRET, etc.
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bank-api
  namespace: bank
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: bank-api
  type: ClusterIP
