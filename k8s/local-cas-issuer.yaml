apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-root-issuer
  namespace: cert-manager
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ca-cert
  namespace: cert-manager
spec:
  isCA: true
  commonName: local-escrow-ca
  secretName: local-ca-secret
  issuerRef:
    name: selfsigned-root-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: escrow-local-issuer
spec:
  ca:
    secretName: local-ca-secret
---
# Mock letsencrypt-prod ClusterIssuer for local development
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  ca:
    secretName: local-ca-secret
---
# Local mTLS Certificates (Drop-in replacements for bank, depositor, beneficiary)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bank-api-internal-cert
  namespace: bank
spec:
  secretName: bank-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - bank-api.bank.svc.cluster.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: escrow-local-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: depositor-api-internal-cert
  namespace: depositor
spec:
  secretName: depositor-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - depositor-api.depositor.svc.cluster.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: escrow-local-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: beneficiary-api-internal-cert
  namespace: beneficiary
spec:
  secretName: beneficiary-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - beneficiary-api.beneficiary.svc.cluster.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: escrow-local-issuer
---
# Mock premium-rwo StorageClass for local dev volumes
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: premium-rwo
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete

