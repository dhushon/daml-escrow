apiVersion: v1
kind: ConfigMap
metadata:
  name: bank-config
  namespace: bank
data:
  bank.conf: |
    canton {
      participants {
        bank {
          storage.type = postgres
          storage.config {
            dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
            properties {
              serverName = "escrow-postgres-dist.default.svc.cluster.local"
              portNumber = 5432
              databaseName = "canton_bank"
              user = "escrow"
              password = "escrow"
            }
          }
          admin-api.address = 0.0.0.0
          admin-api.port = 5001
          ledger-api.address = 0.0.0.0
          ledger-api.port = 5002
          http-ledger-api.address = 0.0.0.0
          http-ledger-api.port = 7575
        }
      }
    }
---
