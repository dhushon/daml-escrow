apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: escrow-postgres-dist
  namespace: default
spec:
  serviceName: "escrow-postgres-dist"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "escrow"
        - name: POSTGRES_PASSWORD
          value: "escrow"
        - name: POSTGRES_DB
          value: "postgres"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata" # Authoritative subdirectory fix
        resources:
          limits:
            cpu: "1.0"
            memory: "2Gi"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "premium-rwo"
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: escrow-postgres-dist
  namespace: default
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
  type: ClusterIP
---
# High-Assurance Database Initializer (One-Shot)
apiVersion: batch/v1
kind: Job
metadata:
  name: escrow-db-init
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: init
        image: postgres:16
        env:
        - name: PGPASSWORD
          value: "escrow"
        command: ["/bin/sh", "-c"]
        args:
        - |
          until psql -h escrow-postgres-dist -U escrow -d postgres -c "select 1"; do sleep 5; done;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "CREATE DATABASE canton_bank;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "CREATE DATABASE canton_depositor;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "CREATE DATABASE canton_beneficiary;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "CREATE DATABASE user_config;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE canton_bank TO escrow;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE canton_depositor TO escrow;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE canton_beneficiary TO escrow;" || true;
          psql -h escrow-postgres-dist -U escrow -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE user_config TO escrow;" || true;
          
          # Initialize User Config Schema tables
          psql -h escrow-postgres-dist -U escrow -d user_config -c "
            CREATE TABLE IF NOT EXISTS configs (
              user_id TEXT NOT NULL,
              config_key TEXT NOT NULL,
              config_value JSONB NOT NULL,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              PRIMARY KEY (user_id, config_key)
            );

            CREATE TABLE IF NOT EXISTS auth_nonces (
              nonce TEXT PRIMARY KEY,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );

            CREATE TABLE IF NOT EXISTS identities (
              okta_sub TEXT PRIMARY KEY,
              daml_user_id TEXT NOT NULL,
              daml_party_id TEXT NOT NULL,
              email TEXT NOT NULL,
              display_name TEXT,
              role TEXT NOT NULL,
              title TEXT,
              affiliation TEXT,
              organization TEXT,
              physical_address TEXT,
              kyc_status TEXT DEFAULT 'PENDING',
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );

            CREATE TABLE IF NOT EXISTS draft_escrows (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              root_id UUID NOT NULL,
              version INTEGER NOT NULL DEFAULT 1,
              proposer_id TEXT NOT NULL,
              invitation_code TEXT,
              contract_type TEXT NOT NULL DEFAULT 'Corporate',
              initiator_id TEXT NOT NULL,
              initiator_role TEXT NOT NULL,
              depositor_id TEXT,
              beneficiary_email TEXT NOT NULL,
              beneficiary_id TEXT,
              mediator_id TEXT,
              amount DECIMAL(18, 2) NOT NULL,
              currency TEXT NOT NULL,
              terms JSONB NOT NULL,
              metadata JSONB,
              change_summary TEXT,
              approvals JSONB NOT NULL DEFAULT '[]',
              status TEXT NOT NULL DEFAULT 'DRAFT',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );

            CREATE INDEX IF NOT EXISTS idx_draft_root ON draft_escrows(root_id);
            CREATE INDEX IF NOT EXISTS idx_draft_invite ON draft_escrows(invitation_code) WHERE invitation_code IS NOT NULL;
          "
      restartPolicy: OnFailure
