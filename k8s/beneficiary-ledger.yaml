apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: beneficiary-ledger
  namespace: beneficiary
spec:
  serviceName: "beneficiary-ledger"
  replicas: 1
  selector:
    matchLabels:
      app: beneficiary-ledger
  template:
    metadata:
      labels:
        app: beneficiary-ledger
    spec:
      containers:
      - name: canton
        image: europe-docker.pkg.dev/da-images/public/docker/canton-base:3.4.11
        ports:
        - containerPort: 5001
          name: admin
        - containerPort: 5002
          name: ledger-api
        - containerPort: 7575
          name: http-api
        env:
        - name: POSTGRES_HOST
          value: "escrow-postgres-dist.default.svc.cluster.local"
        - name: POSTGRES_DB
          value: "canton_beneficiary"
        - name: POSTGRES_USER
          value: "escrow"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: password
        resources:
          limits:
            cpu: "2.0"
            memory: "4Gi"
          requests:
            cpu: "1.0"
            memory: "2Gi"
        command: ["/app/bin/canton"]
        args:
        - "daemon"
        - "--config"
        - "/canton/config/beneficiary.conf"
        - "--bootstrap"
        - "/canton/config/beneficiary_init.canton"
        volumeMounts:
        - name: config-volume
          mountPath: /canton/config
      volumes:
      - name: config-volume
        configMap:
          name: beneficiary-config
---
apiVersion: v1
kind: Service
metadata:
  name: beneficiary-ledger
  namespace: beneficiary
spec:
  ports:
  - port: 7575
    name: http-api
  selector:
    app: beneficiary-ledger
  type: ClusterIP
