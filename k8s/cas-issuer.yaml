apiVersion: cas-issuer.jetstack.io/v1beta1
kind: GoogleCASClusterIssuer
metadata:
  name: escrow-cas-issuer
spec:
  project: vdcai-daml
  location: us-central1
  caPoolId: escrow-ca-pool-dev
---
# High-Assurance Internal Trust Anchors

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bank-api-internal-cert
  namespace: bank
spec:
  secretName: bank-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - bank-api.bank.svc.cluster.local
  issuerRef:
    group: cas-issuer.jetstack.io
    kind: GoogleCASClusterIssuer
    name: escrow-cas-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: depositor-api-internal-cert
  namespace: depositor
spec:
  secretName: depositor-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - depositor-api.depositor.svc.cluster.local
  issuerRef:
    group: cas-issuer.jetstack.io
    kind: GoogleCASClusterIssuer
    name: escrow-cas-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: beneficiary-api-internal-cert
  namespace: beneficiary
spec:
  secretName: beneficiary-api-mtls-secret
  duration: 24h
  renewBefore: 8h
  dnsNames:
    - beneficiary-api.beneficiary.svc.cluster.local
  issuerRef:
    group: cas-issuer.jetstack.io
    kind: GoogleCASClusterIssuer
    name: escrow-cas-issuer
