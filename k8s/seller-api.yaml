apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-api
  namespace: seller
  labels:
    app: seller-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seller-api
  template:
    metadata:
      labels:
        app: seller-api
    spec:
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/vdcai-daml/escrow-platform-dev/escrow-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: LEDGER_HOST
          value: "seller-ledger.seller.svc.cluster.local"
        - name: LEDGER_PORT
          value: "7577"
        - name: PARTICIPANT_ID
          value: "seller"
        - name: GCP_PROJECT_ID
          value: "vdcai-daml"
        - name: ENVIRONMENT
          value: "dev"
        command: ["/app/escrow-api", "serve", "--tls-cert=/etc/escrow/certs/tls.crt", "--tls-key=/etc/escrow/certs/tls.key", "--tls-ca=/etc/escrow/certs/ca.crt"]
        volumeMounts:
        - name: certs
          mountPath: /etc/escrow/certs
          readOnly: true
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
      volumes:
      - name: certs
        secret:
          secretName: seller-api-mtls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: seller-api
  namespace: seller
spec:
  ports:
  - port: 443
    targetPort: 8080
    name: https
  selector:
    app: seller-api
  type: ClusterIP
