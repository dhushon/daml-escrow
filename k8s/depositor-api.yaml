apiVersion: apps/v1
kind: Deployment
metadata:
  name: depositor-api
  namespace: depositor
  labels:
    app: depositor-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: depositor-api
  template:
    metadata:
      labels:
        app: depositor-api
    spec:
      containers:
      - name: api
        image: us-central1-docker.pkg.dev/vdcai-daml/escrow-platform-dev/escrow-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: LEDGER_HOST
          value: "depositor-ledger.depositor.svc.cluster.local"
        - name: LEDGER_NODES_DEPOSITOR_HOST
          value: "depositor-ledger.depositor.svc.cluster.local"
        - name: LEDGER_PORT
          value: "7575"
        - name: PARTICIPANT_ID
          value: "depositor"
        - name: GCP_PROJECT_ID
          value: "vdcai-daml"
        - name: ENVIRONMENT
          value: "dev"
        - name: AUTH_BYPASS
          value: "true"
        - name: USER_CONFIG_DSN
          value: "postgres://escrow:escrow@escrow-postgres-dist.default.svc.cluster.local:5432/user_config?sslmode=disable"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/etc/gcp/credentials.json"
        command: ["/app/escrow-api"]
        args: ["serve", "--tls-cert=/etc/escrow/certs/tls.crt", "--tls-key=/etc/escrow/certs/tls.key", "--tls-ca=/etc/escrow/certs/ca.crt"]
        volumeMounts:
        - name: certs
          mountPath: /etc/escrow/certs
          readOnly: true
        - name: gcp-creds
          mountPath: /etc/gcp
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: depositor-api-mtls-secret
      - name: gcp-creds
        secret:
          secretName: gcp-credentials
          optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: depositor-api
  namespace: depositor
spec:
  ports:
  - port: 443
    targetPort: 8080
    name: https
  selector:
    app: depositor-api
  type: ClusterIP
