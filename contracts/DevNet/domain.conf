      public-api.address = 0.0.0.0
      admin-api.port = 6867
      admin-api.address = 0.0.0.0
    }
  }
  mediators {
    escrow_mediator {
      storage.type = postgres
      storage.config {
        dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
        properties {
          serverName = "escrow-postgres-dev"
          portNumber = 5432
          databaseName = "canton_mediator"
          user = "escrow"
          password = "escrow"
        }
      }
      admin-api.port = 6869
