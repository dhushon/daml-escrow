// Phase 6: Institutional Domain Configuration (Standard Tripartite)
canton {
  sequencers {
    escrow_sequencer {
      storage.type = postgres
      storage.config {
        dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
        properties {
          serverName = "escrow-postgres-dev"
          portNumber = 5432
          databaseName = "canton_sequencer"
          user = "escrow"
          password = "escrow"
