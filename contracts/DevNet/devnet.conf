// Phase 6: Multi-Participant DevNet Configuration (Canton 3.4.x)
canton {
  participants {
    bank {
      storage {
        type = postgres
        config {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          dataSource {
            user = "escrow"
            password = "escrow"
            databaseName = "canton_bank"
            serverName = "postgres"
            portNumber = 5432
          }
        }
      }
      admin-api {
        port = 5001
        address = 0.0.0.0
      }
      ledger-api {
        port = 5002
        address = 0.0.0.0
      }
      http-ledger-api {
        port = 7575
        address = 0.0.0.0
      }
    }
    buyer {
      storage {
        type = postgres
        config {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          dataSource {
            user = "escrow"
            password = "escrow"
            databaseName = "canton_buyer"
            serverName = "postgres"
            portNumber = 5432
          }
        }
      }
      admin-api {
        port = 6001
        address = 0.0.0.0
      }
      ledger-api {
        port = 6002
        address = 0.0.0.0
      }
      http-ledger-api {
        port = 7576
        address = 0.0.0.0
      }
    }
    seller {
      storage {
        type = postgres
        config {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          dataSource {
            user = "escrow"
            password = "escrow"
            databaseName = "canton_seller"
            serverName = "postgres"
            portNumber = 5432
          }
        }
      }
      admin-api {
        port = 7001
        address = 0.0.0.0
      }
      ledger-api {
        port = 7002
        address = 0.0.0.0
      }
      http-ledger-api {
        port = 7577
        address = 0.0.0.0
      }
    }
  }

  domains {
    escrow-domain {
      storage {
        type = postgres
        config {
          dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
          dataSource {
            user = "escrow"
            password = "escrow"
            databaseName = "canton_domain"
            serverName = "postgres"
            portNumber = 5432
          }
        }
      }
      public-api {
        port = 8001
        address = 0.0.0.0
      }
      admin-api {
        port = 8002
        address = 0.0.0.0
      }
    }
  }

  parameters {
    non-standard-config = true
    # Required for multi-participant environments to allow parties on different nodes
    # but still use the same domain for settlement
  }
}
