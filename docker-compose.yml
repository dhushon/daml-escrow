# version: "3.9" /version has been deprecated in favor of specifying the Compose file format in the top-level "format" key. See https://docs.docker.com/compose/compose-file/#version for more details.

services:

  postgres:
    image: postgres:16
    container_name: escrow-postgres
    restart: always
    environment:
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow
      POSTGRES_DB: escrow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ensure clean DB for ledger and user configs
  db-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Setup Ledger DB
        psql -h postgres -U escrow -d postgres -c "DROP DATABASE IF EXISTS escrow;"
        psql -h postgres -U escrow -d postgres -c "CREATE DATABASE escrow;"
        
        # Setup Isolated User Config DB
        psql -h postgres -U escrow -d postgres -c "DROP DATABASE IF EXISTS user_config;"
        psql -h postgres -U escrow -d postgres -c "CREATE DATABASE user_config;"
        
        # Initialize User Config Schema
        psql -h postgres -U escrow -d user_config -c "
          CREATE TABLE IF NOT EXISTS configs (
            user_id TEXT NOT NULL,
            config_key TEXT NOT NULL,
            config_value JSONB NOT NULL,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            PRIMARY KEY (user_id, config_key)
          );

          CREATE TABLE IF NOT EXISTS identities (
            okta_sub TEXT PRIMARY KEY,
            daml_user_id TEXT NOT NULL,
            daml_party_id TEXT NOT NULL,
            email TEXT NOT NULL,
            display_name TEXT,
            role TEXT NOT NULL,
            title TEXT,
            affiliation TEXT,
            organization TEXT,
            physical_address TEXT,
            kyc_status TEXT DEFAULT 'PENDING',
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          CREATE TABLE IF NOT EXISTS draft_escrows (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            root_id UUID NOT NULL, -- Grouping ID for all versions of one negotiation
            version INTEGER NOT NULL DEFAULT 1,
            proposer_id TEXT NOT NULL,
            invitation_code TEXT, -- Only set for version 1
            contract_type TEXT NOT NULL DEFAULT 'Corporate', -- ImportExport, RealEstate, Grants, Corporate
            initiator_id TEXT NOT NULL,
            initiator_role TEXT NOT NULL, -- 'Depositor' or 'Beneficiary'
            depositor_id TEXT,
            beneficiary_email TEXT NOT NULL,
            beneficiary_id TEXT,
            mediator_id TEXT,
            amount DECIMAL(18, 2) NOT NULL,
            currency TEXT NOT NULL,
            terms JSONB NOT NULL,
            metadata JSONB,
            change_summary TEXT,
            approvals JSONB NOT NULL DEFAULT '[]', -- Array of identities who signed this version
            status TEXT NOT NULL DEFAULT 'DRAFT', -- DRAFT, CLAIMED, NEGOTIATION, RATIFIED, PROMOTED
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          CREATE INDEX IF NOT EXISTS idx_draft_root ON draft_escrows(root_id);
          CREATE INDEX IF NOT EXISTS idx_draft_invite ON draft_escrows(invitation_code) WHERE invitation_code IS NOT NULL;
        "
    environment:
      PGPASSWORD: escrow

  sandbox:
    image: europe-docker.pkg.dev/da-images/public/docker/canton-base:3.4.11
    container_name: escrow-ledger
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    ports:
      - "6865:6865"   # Ledger API (gRPC)
      - "6866:6866"   # Admin API
      - "7575:7575"   # HTTP JSON Ledger API
    volumes:
      - ./contracts:/canton/contracts
    entrypoint: ["/app/bin/canton"]
    command:
      - "daemon"
      - "--config"
      - "/canton/contracts/Sandbox/sandbox-docker.conf"
      - "--bootstrap"
      - "/canton/contracts/Sandbox/sandbox_init.canton"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      # 1D97 is port 7575 in hex
      test: ["CMD-SHELL", "grep -q '1D97' /proc/net/tcp || grep -q '1D97' /proc/net/tcp6 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres_data:
