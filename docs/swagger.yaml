basePath: /
definitions:
  api.CreateEscrowRequest:
    properties:
      amount:
        example: 100
        type: number
      buyer:
        example: Buyer
        type: string
      currency:
        example: USD
        type: string
      description:
        example: Payment for goods
        type: string
      milestones:
        items:
          $ref: '#/definitions/ledger.Milestone'
        type: array
      seller:
        example: Seller
        type: string
    type: object
  api.EscrowResponse:
    properties:
      amount:
        type: number
      buyer:
        type: string
      currency:
        type: string
      currentMilestoneIndex:
        type: integer
      id:
        type: string
      milestones:
        items:
          $ref: '#/definitions/ledger.Milestone'
        type: array
      seller:
        type: string
      state:
        type: string
    type: object
  api.ResolveDisputeRequest:
    properties:
      payoutToBuyer:
        example: 50
        type: number
      payoutToSeller:
        example: 50
        type: number
    type: object
  api.SettlementResponse:
    properties:
      amount:
        type: number
      currency:
        type: string
      id:
        type: string
      issuer:
        type: string
      recipient:
        type: string
      status:
        type: string
    type: object
  ledger.Milestone:
    properties:
      amount:
        type: number
      completed:
        type: boolean
      label:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing privacy-preserving stablecoin escrows on DAML.
  title: Stablecoin Escrow API
  version: "1.0"
paths:
  /escrows:
    post:
      consumes:
      - application/json
      description: Initiate a new escrow agreement between buyer and seller
      parameters:
      - description: Escrow Creation Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateEscrowRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.EscrowResponse'
        "400":
          description: invalid request
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      summary: Create a new escrow contract
      tags:
      - escrows
  /escrows/{id}:
    get:
      description: Retrieve information about a specific escrow contract
      parameters:
      - description: Escrow ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EscrowResponse'
        "404":
          description: escrow not found
          schema:
            type: string
      summary: Get escrow details by ID
      tags:
      - escrows
  /escrows/{id}/refund:
    post:
      description: Cancel escrow and return funds (requires mediator)
      parameters:
      - description: Escrow ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: ok
          schema:
            type: string
        "500":
          description: refund failed
          schema:
            type: string
      summary: Refund funds to the buyer
      tags:
      - escrows
  /escrows/{id}/release:
    post:
      description: Approve and release funds for the active milestone
      parameters:
      - description: Escrow ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: ok
          schema:
            type: string
        "500":
          description: release failed
          schema:
            type: string
      summary: Release funds for the current milestone
      tags:
      - escrows
  /escrows/{id}/resolve:
    post:
      consumes:
      - application/json
      description: Mediator resolve dispute by splitting payout
      parameters:
      - description: Escrow ID
        in: path
        name: id
        required: true
        type: string
      - description: Dispute Resolution Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ResolveDisputeRequest'
      responses:
        "200":
          description: ok
          schema:
            type: string
        "400":
          description: invalid request
          schema:
            type: string
        "500":
          description: resolution failed
          schema:
            type: string
      summary: Resolve a disputed escrow
      tags:
      - escrows
  /settlements:
    get:
      description: Retrieve a list of pending settlement obligations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.SettlementResponse'
            type: array
        "500":
          description: internal error
          schema:
            type: string
      summary: List all pending settlements
      tags:
      - settlements
  /settlements/{id}/settle:
    post:
      description: Issuer (Central Bank) settles the obligation and releases stablecoins
      parameters:
      - description: Settlement ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: ok
          schema:
            type: string
        "500":
          description: settlement failed
          schema:
            type: string
      summary: Finalize a pending settlement
      tags:
      - settlements
swagger: "2.0"
