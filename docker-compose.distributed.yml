version: '3.8'

networks:
  escrow-net:
    name: escrow-net
    external: false

services:
  # --- Persistent Ledger Infrastructure ---

  escrow-postgres:
    image: postgres:16
    container_name: escrow-postgres-dev
    environment:
      - POSTGRES_USER=escrow
      - POSTGRES_PASSWORD=escrow
      - POSTGRES_DB=canton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d canton"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escrow-net

  escrow-db-init:
    image: postgres:16
    container_name: escrow-db-init-dev
    depends_on:
      escrow-postgres:
        condition: service_healthy
    command: >
      sh -c "psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE canton_bank;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE canton_depositor;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE canton_beneficiary;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE canton_sequencer;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE canton_mediator;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE user_config;' || true;
             psql postgres://escrow:escrow@escrow-postgres:5432/user_config -c \"
               CREATE TABLE IF NOT EXISTS identities (
                 okta_sub TEXT PRIMARY KEY,
                 daml_user_id TEXT NOT NULL,
                 daml_party_id TEXT NOT NULL,
                 email TEXT NOT NULL,
                 display_name TEXT,
                 role TEXT NOT NULL,
                 title TEXT,
                 affiliation TEXT,
                 organization TEXT,
                 physical_address TEXT,
                 kyc_status TEXT DEFAULT 'PENDING',
                 updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
               );
               CREATE TABLE IF NOT EXISTS draft_escrows (
                 id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                 root_id UUID NOT NULL,
                 version INTEGER NOT NULL DEFAULT 1,
                 proposer_id TEXT NOT NULL,
                 invitation_code TEXT,
                 contract_type TEXT NOT NULL DEFAULT 'Corporate',
                 initiator_id TEXT NOT NULL,
                 initiator_role TEXT NOT NULL,
                 depositor_id TEXT,
                 beneficiary_email TEXT NOT NULL,
                 beneficiary_id TEXT,
                 mediator_id TEXT,
                 amount DECIMAL(18, 2) NOT NULL,
                 currency TEXT NOT NULL,
                 terms JSONB NOT NULL,
                 metadata JSONB,
                 change_summary TEXT,
                 approvals JSONB NOT NULL DEFAULT '[]',
                 status TEXT NOT NULL DEFAULT 'DRAFT',
                 created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
               );
               CREATE INDEX IF NOT EXISTS idx_draft_root ON draft_escrows(root_id);
             \""
    networks:
      - escrow-net

  escrow-ledger:
    image: europe-docker.pkg.dev/da-images/public/docker/canton-base:3.4.11
    container_name: escrow-ledger-dev
    ports:
      - "7575:7575" # Bank API
      - "7576:7576" # Buyer API
      - "7577:7577" # Seller API
    volumes:
      - ./contracts/DevNet/participant.conf:/etc/canton/participant.conf
      - ./contracts/DevNet/domain.conf:/etc/canton/domain.conf
      - ./contracts/DevNet/devnet_init.canton:/etc/canton/init.canton
      - ./contracts:/etc/canton/contracts:ro
    entrypoint: ["/app/bin/canton"]
    command: >
      daemon
      -c /etc/canton/participant.conf 
      -c /etc/canton/domain.conf 
      --bootstrap /etc/canton/init.canton
    depends_on:
      escrow-db-init:
        condition: service_completed_successfully
    networks:
      - escrow-net

  # --- Sovereign Tripartite APIs ---

  frontend:
    build:
      context: ./frontend
    container_name: escrow-frontend-dev
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_API_URL=http://localhost:8080
    networks:
      - escrow-net
    depends_on:
      - escrow-gateway

  bank-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: bank-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_BANK_HOST=canton
      - LEDGER_NODES_BANK_PORT=7575
      - PARTICIPANT_ID=bank
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  depositor-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: depositor-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_DEPOSITOR_HOST=canton
      - LEDGER_NODES_DEPOSITOR_PORT=7576
      - PARTICIPANT_ID=depositor
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8082:8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  beneficiary-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: beneficiary-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_BENEFICIARY_HOST=canton
      - LEDGER_NODES_BENEFICIARY_PORT=7577
      - PARTICIPANT_ID=beneficiary
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8083:8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  # --- Unified Institutional Gateway ---

  escrow-gateway:
    image: nginx:alpine
    container_name: escrow-gateway-dev
    ports:
      - "8080:8080"
    volumes:
      - ./config/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bank-api
      - depositor-api
      - beneficiary-api
    networks:
      - escrow-net
