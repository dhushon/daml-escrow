version: '3.8'

networks:
  escrow-net:
    name: escrow-net
    external: false

services:
  # --- Persistent Ledger Infrastructure ---

  escrow-postgres:
    image: postgres:16
    container_name: escrow-postgres-dev
    environment:
      - POSTGRES_USER=escrow
      - POSTGRES_PASSWORD=escrow
      - POSTGRES_DB=canton
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d canton"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escrow-net

  escrow-db-init:
    image: postgres:16
    container_name: escrow-db-init-dev
    depends_on:
      escrow-postgres:
        condition: service_healthy
    command: >
      sh -c "psql postgres://escrow:escrow@escrow-postgres:5432/postgres -c 'CREATE DATABASE user_config;' || true"
    networks:
      - escrow-net

  escrow-ledger:
    image: europe-docker.pkg.dev/da-images/public/docker/canton-base:3.4.11
    container_name: escrow-ledger-dev
    ports:
      - "7575:7575" # Bank API
      - "7576:7576" # Buyer API
      - "7577:7577" # Seller API
    volumes:
      - ./contracts/DevNet/participant.conf:/etc/canton/participant.conf
      - ./contracts/DevNet/domain.conf:/etc/canton/domain.conf
      - ./contracts/DevNet/devnet_init.canton:/etc/canton/init.canton
    command: >
      -c /etc/canton/participant.conf 
      -c /etc/canton/domain.conf 
      --bootstrap /etc/canton/init.canton
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - escrow-net

  # --- Sovereign Tripartite APIs ---

  bank-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: bank-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_BANK_HOST=canton
      - LEDGER_NODES_BANK_PORT=7575
      - PARTICIPANT_ID=bank
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  buyer-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: buyer-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_BUYER_HOST=canton
      - LEDGER_NODES_BUYER_PORT=7576
      - PARTICIPANT_ID=buyer
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8082:8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  seller-api:
    build:
      context: .
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: seller-api-dev
    command: ["serve", "--notls"]
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_NODES_SELLER_HOST=canton
      - LEDGER_NODES_SELLER_PORT=7577
      - PARTICIPANT_ID=seller
      - USER_CONFIG_DSN=postgres://escrow:escrow@escrow-postgres-dev:5432/user_config?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-dev:4318
    ports:
      - "8083:8081"
    depends_on:
      - escrow-ledger
    networks:
      - escrow-net
    links:
      - escrow-ledger:canton

  # --- Unified Institutional Gateway ---

  escrow-gateway:
    image: nginx:alpine
    container_name: escrow-gateway-dev
    ports:
      - "8080:8080"
    volumes:
      - ./config/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bank-api
      - buyer-api
      - seller-api
    networks:
      - escrow-net
