# Phase 8: Multi-Participant Sovereign Topology (Local Docker)
# Isolated nodes and APIs for Bank, Buyer, and Seller with a unified Gateway entrypoint.

services:
  postgres:
    image: postgres:16
    container_name: escrow-postgres-dist
    restart: always
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escrow-net

  db-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        export PGPASSWORD=escrow
        for db in canton_bank canton_buyer canton_seller canton_sequencer canton_mediator user_config; do
          psql -h postgres -U escrow -d postgres -c "DROP DATABASE IF EXISTS $$db;"
          psql -h postgres -U escrow -d postgres -c "CREATE DATABASE $$db;"
        done
        
        # Initialize User Config Schema
        psql -h postgres -U escrow -d user_config -c "
          CREATE TABLE IF NOT EXISTS configs (
            user_id TEXT NOT NULL,
            config_key TEXT NOT NULL,
            config_value JSONB NOT NULL,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            PRIMARY KEY (user_id, config_key)
          );
        "
    networks:
      - escrow-net

  canton:
    image: europe-docker.pkg.dev/da-images/public/docker/canton-base:3.4.11
    container_name: escrow-ledger-dist
    ports:
      - "7575:7575"   # Bank HTTP API
      - "7576:7576"   # Buyer HTTP API
      - "7577:7577"   # Seller HTTP API
    volumes:
      - ./contracts:/canton/contracts
    entrypoint: ["/app/bin/canton"]
    command:
      - "daemon"
      - "--config"
      - "/canton/contracts/DevNet/devnet.conf"
      - "--bootstrap"
      - "/canton/contracts/DevNet/devnet_init.canton"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - escrow-net

  # --- Sovereign Tripartite APIs ---

  bank-api:
    build: .
    container_name: bank-api-dev
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_HOST=canton
      - LEDGER_PORT=7575
      - PARTICIPANT_ID=bank
      - USER_CONFIG_DSN=postgres://escrow:escrow@postgres:5432/user_config?sslmode=disable
    depends_on:
      canton:
        condition: service_started
    networks:
      - escrow-net

  buyer-api:
    build: .
    container_name: buyer-api-dev
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_HOST=canton
      - LEDGER_PORT=7576
      - PARTICIPANT_ID=buyer
      - USER_CONFIG_DSN=postgres://escrow:escrow@postgres:5432/user_config?sslmode=disable
    depends_on:
      canton:
        condition: service_started
    networks:
      - escrow-net

  seller-api:
    build: .
    container_name: seller-api-dev
    environment:
      - ENVIRONMENT=dev
      - AUTH_BYPASS=true
      - LEDGER_HOST=canton
      - LEDGER_PORT=7577
      - PARTICIPANT_ID=seller
      - USER_CONFIG_DSN=postgres://escrow:escrow@postgres:5432/user_config?sslmode=disable
    depends_on:
      canton:
        condition: service_started
    networks:
      - escrow-net

  # --- Unified Gateway (Nginx Ingress Simulator) ---

  gateway:
    image: nginx:alpine
    container_name: escrow-gateway-dev
    volumes:
      - ./config/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - bank-api
      - buyer-api
      - seller-api
    networks:
      - escrow-net

networks:
  escrow-net:
    name: escrow-net
    driver: bridge
