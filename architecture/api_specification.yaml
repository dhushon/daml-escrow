openapi: 3.0.0
info:
  title: Stablecoin Escrow API
  version: 1.0.0
  description: |
    API for managing privacy-preserving stablecoin escrows on DAML with Oracle integration.
    Includes support for standardized metadata vocabularies inspired by Grants.gov and 
    supply chain standards.

paths:
  /escrows:
    post:
      summary: Create a new escrow contract
      operationId: createEscrow
      tags:
        - escrows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEscrowRequest'
      responses:
        '201':
          description: Escrow created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Escrow'
        '400':
          description: Invalid request parameters

  /escrows/{escrowID}:
    get:
      summary: Get escrow details by ID
      operationId: getEscrow
      tags:
        - escrows
      parameters:
        - name: escrowID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Escrow details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Escrow'
        '404':
          description: Escrow not found

  /webhooks/milestone:
    post:
      summary: Oracle trigger for milestone approval
      description: |
        Receives external events (e.g. shipping, service completion) to automatically
        advance escrow milestones. Supports a flexible metadata vocabulary.
      operationId: oracleMilestoneTrigger
      tags:
        - oracles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OracleWebhookRequest'
      responses:
        '200':
          description: Webhook processed and milestone approved
        '401':
          description: Invalid signature
        '404':
          description: Escrow or Milestone not found

components:
  schemas:
    CreateEscrowRequest:
      type: object
      required:
        - issuer
        - mediator
        - totalAmount
        - currency
        - milestones
      properties:
        issuer:
          type: string
        buyer:
          type: string
          description: Optional for anonymous buyer scenarios (e.g. hashed identity)
        seller:
          type: string
          description: Optional for anonymous seller scenarios
        mediator:
          type: string
        totalAmount:
          type: number
          format: decimal
        currency:
          type: string
        description:
          type: string
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        metadata:
          $ref: '#/components/schemas/MetadataMap'

    Escrow:
      type: object
      properties:
        id:
          type: string
        issuer:
          type: string
        buyer:
          type: string
        seller:
          type: string
        mediator:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        description:
          type: string
        currentMilestoneIndex:
          type: integer
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        metadata:
          $ref: '#/components/schemas/MetadataMap'

    Milestone:
      type: object
      required:
        - label
        - amount
      properties:
        label:
          type: string
        amount:
          type: number
        completed:
          type: boolean
          default: false

    OracleWebhookRequest:
      type: object
      required:
        - escrowId
        - milestoneIndex
        - event
        - signature
      properties:
        escrowId:
          type: string
          description: The Daml Contract ID of the escrow
        milestoneIndex:
          type: integer
          description: Index of the milestone to approve
        event:
          type: string
          example: "DELIVERY_CONFIRMED"
        oracleProvider:
          type: string
          description: Identity of the oracle sending the data
        evidence:
          type: string
          description: URL or hash of the proof (e.g. BOL, signed PDF)
        metadata:
          $ref: '#/components/schemas/MetadataMap'
        signature:
          type: string
          description: HMAC or Asymmetric signature for payload verification

    MetadataMap:
      type: object
      description: |
        A flexible map for "any:any" data. 
        Recommended (Optional) Standard Vocabulary:
        - `opportunityId`: Grants.gov funding opportunity number
        - `assistanceListing`: Grants.gov ALN (formerly CFDA)
        - `uei`: Unique Entity Identifier (SDE standard)
        - `trackingNumber`: Logistics tracking ID
        - `carrier`: Shipping provider (FedEx, UPS, etc.)
        - `sku`: Product identifier
        - `origin`: Source location
        - `destination`: Target location
      additionalProperties: true
      example:
        opportunityId: "O-ABC-123"
        trackingNumber: "ZYX987"
        carrier: "FedEx"
        customField: "AnyValue"
