openapi: 3.0.0
info:
  title: Stablecoin Escrow API
  version: 1.0.0
  description: |
    API for managing privacy-preserving stablecoin escrows on DAML with Oracle integration.
    This version implements a schema-driven metadata model where core escrow dynamics
    are generic, and industry-specific contracted elements are validated via external JSON Schemas.

paths:
  /escrows:
    post:
      summary: Create a new escrow contract
      operationId: createEscrow
      tags:
        - escrows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEscrowRequest'
      responses:
        '201':
          description: Escrow created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Escrow'
        '400':
          description: Invalid request parameters

  /escrows/{escrowID}:
    get:
      summary: Get escrow details by ID
      operationId: getEscrow
      tags:
        - escrows
      parameters:
        - name: escrowID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Escrow details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Escrow'
        '404':
          description: Escrow not found

  /webhooks/milestone:
    post:
      summary: Oracle trigger for milestone approval
      description: |
        Receives external events to automatically advance escrow milestones.
        Payloads include structured evidence and can be verified against the
        contract's specific JSON Schema.
      operationId: oracleMilestoneTrigger
      tags:
        - oracles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OracleWebhookRequest'
      responses:
        '200':
          description: Webhook processed and milestone approved
        '401':
          description: Invalid signature
        '404':
          description: Escrow or Milestone not found

components:
  schemas:
    CreateEscrowRequest:
      type: object
      required:
        - issuer
        - mediator
        - totalAmount
        - currency
        - milestones
      properties:
        issuer:
          type: string
        buyer:
          type: string
          description: Optional for anonymous buyer scenarios
        seller:
          type: string
          description: Optional for anonymous seller scenarios
        mediator:
          type: string
        totalAmount:
          type: number
          format: decimal
        currency:
          type: string
        description:
          type: string
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        metadata:
          $ref: '#/components/schemas/EscrowMetadata'

    Escrow:
      type: object
      properties:
        id:
          type: string
        issuer:
          type: string
        buyer:
          type: string
        seller:
          type: string
        mediator:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        description:
          type: string
        currentMilestoneIndex:
          type: integer
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        metadata:
          $ref: '#/components/schemas/EscrowMetadata'

    Milestone:
      type: object
      required:
        - label
        - amount
      properties:
        label:
          type: string
        amount:
          type: number
        completed:
          type: boolean
          default: false

    OracleWebhookRequest:
      type: object
      required:
        - escrowId
        - milestoneIndex
        - event
        - signature
      properties:
        escrowId:
          type: string
        milestoneIndex:
          type: integer
        event:
          type: string
        oracleProvider:
          type: string
        evidence:
          type: string
        metadata:
          type: object
          description: Raw event metadata payload
          additionalProperties: true
        signature:
          type: string

    EscrowMetadata:
      type: object
      description: |
        A schema-driven data container. The 'payload' is an 'any:any' map
        that should be marshalled according to the provided 'schemaUrl'.
      properties:
        schemaUrl:
          type: string
          description: URL to the JSON Schema for the payload (e.g., leasing.json, supply-chain.json)
          example: "https://stablecoin-escrow.io/schemas/leasing.v1.json"
        payload:
          type: object
          description: The actual metadata fields (Contracted Elements)
          additionalProperties: true
          example:
            assetId: "SERIAL-123"
            securityDepositAmount: 5000
            assetType: "Machinery"
